name: Build, Test & Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "*.sh"
      - "*.py"
      - "config/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
  release:
    types: [published]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      obsidian_version:
        description: "Obsidian version to build"
        required: false
        default: "1.12.7"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Determine Obsidian version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "obsidian_version=${{ github.event.inputs.obsidian_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "obsidian_version=1.12.7" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: obsidian-docker:test
          build-args: |
            OBSIDIAN_VERSION=${{ steps.version.outputs.obsidian_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate test API key
        id: apikey
        run: |
          KEY=$(openssl rand -hex 32)
          echo "::add-mask::${KEY}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Start container
        run: LOCAL_REST_API_KEY=${{ steps.apikey.outputs.key }} docker compose up -d

      - name: Wait for Obsidian REST API
        run: |
          echo "Waiting for REST API (up to 180s)..."
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:27123/ >/dev/null 2>&1; then
              echo "REST API ready after $((i*2))s"
              break
            fi
            sleep 2
          done

      - name: Seed test vault
        run: |
          chmod +x tests/seed-vault.sh
          ./tests/seed-vault.sh

      - name: Run integration tests
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh http://127.0.0.1:27123 ${{ steps.apikey.outputs.key }}

      - name: Capture logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v

  push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Obsidian version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "obsidian_version=${{ github.event.inputs.obsidian_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "obsidian_version=1.12.7" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=ref,event=pr

      - name: Push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OBSIDIAN_VERSION=${{ steps.version.outputs.obsidian_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
