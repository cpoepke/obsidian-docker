name: Build, Test & Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "*.sh"
      - "*.py"
      - "config/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      obsidian_version:
        description: "Obsidian version to build"
        required: false
        default: "1.8.9"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine Obsidian version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "obsidian_version=${{ github.event.inputs.obsidian_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "obsidian_version=1.8.9" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: obsidian-docker:test
          build-args: |
            OBSIDIAN_VERSION=${{ steps.version.outputs.obsidian_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker compose up -d

      - name: Seed test vault
        run: |
          chmod +x tests/seed-vault.sh
          sleep 10
          ./tests/seed-vault.sh

      - name: Run integration tests
        run: |
          chmod +x tests/run-tests.sh
          ./tests/run-tests.sh http://127.0.0.1:27123

      - name: Capture logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v

  push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Obsidian version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "obsidian_version=${{ github.event.inputs.obsidian_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "obsidian_version=1.8.9" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=pr

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OBSIDIAN_VERSION=${{ steps.version.outputs.obsidian_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
